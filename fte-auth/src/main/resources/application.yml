server:
  port: 10003 # 认证服务端口
spring:
  application:
    name: exam-auth # 服务名称
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: localhost:8848 # nacos地址
    loadbalancer:
      ribbon:
        enabled: false
feign:
  okhttp:
    enabled: true
  httpclient:
    connection-timeout: 2000  #单位ms,默认2000
    max-connections: 200 #线程池最大连接数
  loadbalancer:
    enabled: false
logging:
  level:
    yourproject.userClient: debug
